    <title>Photography Portfolio</title>

    <link rel="stylesheet" href="normalize.css">

</head>
<body>

<div class="container">
    <h1>Photography Portfolio</h1>

    <div class="accordion">

        <input type="radio" name="accordion" id="item1" checked>

            </div>
